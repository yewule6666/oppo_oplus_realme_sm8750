name: 6.6.89 OPlus OKI Kernel Refined Build

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: '89'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-ecsv2-6.6.89

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU Type'
        required: true
        type: choice
        default: 'resukisu'
        options: [ 'resukisu', 'sukisu', 'ksunext', 'ksu', 'none' ]
      susfs_enable:
        description: 'Enable SUSFS'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: 'Enable KPM'
        required: true
        type: choice
        default: 'false'
        options: [ 'false', 'builtin', 'kpm' ]
      lz4_enable:
        description: 'Enable LZ4+ZSTD'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'Enable LZ4KD'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: 'BBR'
        required: true
        type: choice
        default: 'false'
        options: [ 'false', 'true', 'default' ]
      better_net:
        description: 'Net Features'
        required: true
        type: boolean
        default: 'false'
      adios_enable:
        description: 'Enable ADIOS'
        required: true
        type: boolean
        default: 'true'
      baseband_guard:
        description: 'Enable BBG'
        required: true
        type: boolean
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Environment Setup
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev aria2 wget
          
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache || true
          [ -f ccache ] && { sudo cp -f ./ccache /usr/bin/ccache; sudo chmod +x /usr/bin/ccache; rm -f ./ccache; }

          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip
          unzip -q common.zip && mv android_kernel_common_oneplus_sm8750* common && rm common.zip
          
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18 && rm clang.zip
          
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && mv build-tools* build-tools && rm build-tools.zip

      - name: KernelSU Setup
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            [ -d KernelSU ] && cd KernelSU && KSU_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "30700") && echo "KSUVER=$((KSU_VERSION + 30700))" >> $GITHUB_ENV || echo "KSUVER=30700" >> $GITHUB_ENV
          elif [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            [ -d KernelSU ] && cd KernelSU && KSU_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "37185") && echo "KSUVER=$((KSU_VERSION + 37185))" >> $GITHUB_ENV || echo "KSUVER=37185" >> $GITHUB_ENV
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            [ -d KernelSU-Next ] && cd KernelSU-Next && KSU_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "30000") && echo "KSUVER=$((KSU_VERSION + 30000))" >> $GITHUB_ENV || echo "KSUVER=30000" >> $GITHUB_ENV
          fi

      - name: SUSFS Integration
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4oki -b oki-6.6 || git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4oki

          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-6.6.patch ./common/ 2>/dev/null || cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/ || true
          cp -r ./susfs4oki/kernel_patches/fs/* ./common/fs/ || true
          cp -r ./susfs4oki/kernel_patches/include/linux/* ./common/include/linux/ || true
          
          cd common
          patch -p1 < 50_add_susfs_in_gki-*.patch || true
          cd ..

          if [[ ${{ github.event.inputs.ksu_type }} == "resukisu" || ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/ 2>/dev/null || true
            cd KernelSU && patch -p1 < 10_enable_susfs_for_ksu.patch || true && cd ..
          fi

          cat >> ./common/arch/arm64/configs/gki_defconfig <<EOF
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          EOF

      - name: Final Build
        run: |
          cd kernel_workspace/common
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang18/bin:$GITHUB_WORKSPACE/kernel_workspace/build-tools/bin:$PATH"
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out Image

      - name: Package
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          cp common/out/arch/arm64/boot/Image ./AnyKernel3/
          cd AnyKernel3 && zip -r ../AnyKernel3_Build.zip ./*

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Build
          path: kernel_workspace/*.zip
