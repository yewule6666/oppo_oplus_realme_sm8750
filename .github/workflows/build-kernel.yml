name: 6.6.89 欧加真OKI内核快速构建

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android15'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: '89'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'
  CCACHE_KEY: ccache-ecsv2-6.6.89

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU)'
        required: true
        type: choice
        default: 'resukisu'
        options: [ 'resukisu', 'sukisu', 'ksunext', 'ksu', 'none' ]
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: true
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true
      better_net:
        description: '是否开启网络功能拓展配置(ipset/iptables)'
        required: true
        type: boolean
        default: false
      adios_enable:
        description: '是否启用ADIOS IO调度器支持'
        required: true
        type: boolean
        default: true
      baseband_guard:
        description: '是否开启内核级基带保护(BBG)'
        required: true
        type: boolean
        default: true
      kernel_suffix:
        description: '内核后缀'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 环境初始化及源码拉取
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt install -y binutils python-is-python3 libssl-dev libelf-dev aria2 wget
          
          # 克隆源码和工具链
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89.zip -o common.zip
          unzip -q common.zip && mv android_kernel_common_oneplus_sm8750* common && rm common.zip
          
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18 && rm clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && rm build-tools.zip

      - name: 配置 KernelSU 源码
        run: |
          cd kernel_workspace
          case "${{ github.event.inputs.ksu_type }}" in
            "resukisu") curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main ;;
            "sukisu") curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin ;;
            "ksunext") curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs ;;
            "ksu") curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main ;;
          esac

      - name: 集成所有补丁与高级功能
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd kernel_workspace
          # 解决 GitHub 认证问题
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          
          # --- SUSFS 逻辑 ---
          if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
            echo "正在集成 SUSFS..."
            git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4oki -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4oki/kernel_patches/fs/* ./common/fs/
            cp ./susfs4oki/kernel_patches/include/linux/* ./common/include/linux/
            cd common && patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true && cd ..
            
            # KSU 侧支持
            if [ -d "KernelSU" ]; then
              cp ./susfs4ksu/kernel_patches/SukiSU/10_enable_susfs_for_sukisu.patch ./KernelSU/ || cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
              cd KernelSU && patch -p1 < *.patch || true && cd ..
            fi
            echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi

          # --- LZ4 / ZSTD 优化 ---
          if [[ "${{ github.event.inputs.lz4_enable }}" == "true" ]]; then
            echo "应用 LZ4 1.10 & ZSTD 补丁..."
            git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME build_assets
            cp ./build_assets/zram_patch/001-lz4.patch ./common/
            cp ./build_assets/zram_patch/lz4armv8.S ./common/lib/
            cp ./build_assets/zram_patch/002-zstd.patch ./common/
            cd common && git apply -p1 < 001-lz4.patch || true && patch -p1 < 002-zstd.patch || true && cd ..
          fi

          # --- 网络功能增强 (Ipset/BBR) ---
          if [[ "${{ github.event.inputs.better_net }}" == "true" ]]; then
            { echo "CONFIG_IP_SET=y"; echo "CONFIG_IP_SET_HASH_IP=y"; echo "CONFIG_TCP_CONG_BBR=y"; } >> ./common/arch/arm64/configs/gki_defconfig
          fi

          # --- ADIOS & BBG ---
          [[ "${{ github.event.inputs.adios_enable }}" == "true" ]] && echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ "${{ github.event.inputs.baseband_guard }}" == "true" ]]; then
            echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
            cd common && curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash && cd ..
          fi

      - name: 开始编译内核 (SM8750)
        run: |
          cd kernel_workspace/common
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          export PATH="../clang18/bin:../build-tools/bin:$PATH"
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out Image

      - name: 打包 AnyKernel3 并发布
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/AnyKernel3
          cp common/out/arch/arm64/boot/Image ./AnyKernel3/
          cd AnyKernel3 && zip -r ../kernel-build.zip ./* && cd ..
          gh release create "build-$(date +%Y%m%d%H%M)" kernel-build.zip --title "SM8750 内核更新"
